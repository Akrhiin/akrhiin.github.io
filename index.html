<!DOCTYPE html>
<html lang="en" id="index_html">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Michael Pace</title>
        <link rel="stylesheet" href="style/style.css">
        <!-- <link rel="icon" href="media/favicon.ico" type="image/x-icon"> -->
    </head>
    <body>
        <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/108/three.min.js'></script>
        <script src='https://cdn.jsdelivr.net/gh/mrdoob/Three.js@r92/examples/js/loaders/GLTFLoader.js'></script>
        <script>
            // CURSOR CIRCLE
            var offX = 15;          // X offset from mouse position
            var offY = 15;          // Y offset from mouse position

            function mouseX(evt) {if (!evt) evt = window.event; if (evt.pageX) return evt.pageX; else if (evt.clientX)return evt.clientX + (document.documentElement.scrollLeft ?  document.documentElement.scrollLeft : document.body.scrollLeft); else return 0;}
            function mouseY(evt) {if (!evt) evt = window.event; if (evt.pageY) return evt.pageY; else if (evt.clientY)return evt.clientY + (document.documentElement.scrollTop ? document.documentElement.scrollTop : document.body.scrollTop); else return 0;}

            function follow(evt) 
            {
                var obj = document.getElementById('circle').style;
                obj.left = (parseInt(mouseX(evt))+offX) + 'px';
                obj.top = (parseInt(mouseY(evt))+offY) + 'px'; 
            }
            document.onmousemove = follow;

            // LIGHT / DARK MODE
            function toggleLight()
            {
                var x = document.getElementById("mode-filter");
                if (x.style.display === "block")
                {
                    x.style.display = "none";
                }
                else
                {
                    x.style.display = "block";
                }
            }
        </script>
        <header>
            <section id="index-content-block">
                <h2 id="index_japanese">あなたはこれを読むことができますか？</h2>
                <nav id="index_navbar">
                    <h1 id="index_name">MICHAEL PACE</h1>
                    <ul id="index_nav_block">
                        <li class="index_nav_link"><a href="about.html">ABOUT</a></li>
                        <li class="index_nav_link"><a href="projects.html">PROJECTS</a></li>
                        <li class="index_nav_link"><a href="contact.html">CONTACT</a></li>
                    </ul>
                    <img id="index_qr" alt="QR Code to GitHub Account" src="media/index/github_qr.png">
                    <img id="mode-button" alt="Toggle Dark Mode Button" src="media/toggle_light.png" onclick="toggleLight()">
                </nav>
            </section>
        </header>
        <main>
            <section id="circle">
                <img src="media/circle.png" alt="" style="cursor:none;"/>
            </section>
        </main>
        <section id="mode-filter" style="display: none;"></section>
    </body>
</html>
